<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>הזמנה לדייט</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Frank+Ruhl+Libre:wght@300;400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --pink-light:  #fff0f0;
            --pink-mid:    #ffcece;
            --pink-main:   #ff4d4d;
            --cream:       #fff8f8;
        }

        body {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            min-height: 100vh; margin: 0; overflow: hidden; position: relative;
            background-color: var(--pink-light);
            font-family: 'Frank Ruhl Libre', serif;
        }

        /* רקע נושם */
        .bg-mesh {
            position: fixed; inset: 0; z-index: 0;
            background: radial-gradient(ellipse at 20% 20%, #ffd6d6 0%, transparent 55%),
                        radial-gradient(ellipse at 80% 80%, #ffe0e0 0%, transparent 55%);
            animation: meshShift 8s ease-in-out infinite alternate;
        }
        @keyframes meshShift {
            0%   { filter: hue-rotate(0deg) brightness(1); }
            100% { filter: hue-rotate(8deg) brightness(1.04); }
        }

        /* לבבות מרחפים */
        .hearts-bg { position: fixed; inset: 0; z-index: 0; pointer-events: none; overflow: hidden; }
        .heart-particle {
            position: absolute; bottom: -60px; font-size: 1.2rem; opacity: 0;
            animation: floatUp linear infinite;
        }
        /* הגדרות פרטניות לכל לב */
        .heart-particle:nth-child(1)  { left: 5%;  font-size: 0.8rem; animation-duration: 9s;  animation-delay: 0s;   }
        .heart-particle:nth-child(2)  { left: 28%; font-size: 0.9rem; animation-duration: 8s;  animation-delay: 4s;   }
        .heart-particle:nth-child(3)  { left: 58%; font-size: 0.7rem; animation-duration: 10s; animation-delay: 3s;   }
        .heart-particle:nth-child(4)  { left: 82%; font-size: 0.9rem; animation-duration: 9s;  animation-delay: 5s;   }
        
        @keyframes floatUp {
            0%   { transform: translateY(0) rotate(0deg); opacity: 0; }
            10%  { opacity: 0.4; }
            80%  { opacity: 0.25; }
            100% { transform: translateY(-110vh) rotate(25deg); opacity: 0; }
        }

        /* התוכן המרכזי */
        .content { position: relative; z-index: 1; display: flex; flex-direction: column; align-items: center; text-align: center; }
        
        #cute-gif {
            width: 180px; height: 180px; border-radius: 50%; box-shadow: 0 0 0 6px var(--cream), 0 0 0 10px var(--pink-mid);
            margin-bottom: 22px; transition: box-shadow 0.4s ease;
        }
        h1#questionText { color: var(--pink-main); font-size: clamp(1.6rem, 5vw, 2.8rem); font-weight: 700; margin-bottom: 1.8rem; transition: opacity 0.25s, transform 0.25s; }
        h1#questionText.changing { opacity: 0; transform: translateY(-8px); }

        .buttons-container { display: flex; gap: 18px; }
        button { font-family: 'Frank Ruhl Libre', serif; font-size: 1.4rem; font-weight: 700; padding: 12px 36px; border: none; border-radius: 50px; cursor: pointer; transition: all 0.3s ease; }
        #yesBtn { background: linear-gradient(135deg, #ff6b6b, #ff3333); color: white; box-shadow: 0 6px 20px rgba(255, 77, 77, 0.45); }
        #noBtn { background-color: #f0f0f0; color: #555; position: relative; transition: left 0.7s ease-out, top 0.7s ease-out, transform 0.3s ease, background-color 0.3s ease; }
    </style>
</head>
<body>
    <div class="bg-mesh"></div>
    <div class="hearts-bg">
        <span class="heart-particle">💗</span><span class="heart-particle">♡</span>
        <span class="heart-particle">💕</span><span class="heart-particle">💖</span>
    </div>
    
    <div class="content">
        <div class="bear-wrapper" id="bearWrapper"><img id="cute-gif" src="idle.gif" alt="דובי חמוד"></div>
        <h1 id="questionText">מאמי, האם תרצי לצאת איתי לדייט?</h1>
        <div class="buttons-container">
            <button id="yesBtn" onclick="acceptDate()">כן!</button>
            <button id="noBtn" onmouseover="runAway()" onclick="rejectDate()">לא</button>
        </div>
    <!--<button id="noBtn" onmouseover="runAway()" onclick="rejectDate()">לא</button>
     <button id="yesBtn" onclick="acceptDate()">כן!</button> --> 
          
    <script>
        let noClickCount = 0;
        let currentMood = 'idle'; // השומר שלנו למניעת טעינות כפולות
        let isAccepted = false; // השומר שלנו למניעת שינויים אחרי ה"כן"

        const questionText  = document.getElementById('questionText');
        const yesBtn        = document.getElementById('yesBtn');
        const noBtn         = document.getElementById('noBtn');
        const gifImage      = document.getElementById('cute-gif');
        
        const preloadedGifs = {};
        ['happy.gif', 'sad.gif', 'idle.gif'].forEach(gif => {
            preloadedGifs[gif] = new Image();
            preloadedGifs[gif].src = gif;
        });

        function rejectDate() {
            noClickCount++;
            
            // if (noClickCount === 1) {
            //     questionText.innerText = "האם את בטוחה?";
            //     yesBtn.style.transform = "scale(1.5)";
            //     noBtn.style.transform = "scale(0.5)";
            if (noClickCount === 1) {
                questionText.innerText = "נו בבקשהה 🥺";
                yesBtn.style.transform = "scale(1.5)";
                noBtn.style.transform = "scale(0.5)";
            } else if (noClickCount >= 2) {
                // תיקון הבאג: אם היא לא הזיזה את העכבר ולחצה פעם שלישית - הכפתור יברח!
                // runAway();
                noBtn.innerText = "כן!";
                noBtn.style.background = "linear-gradient(135deg, #ff6b6b, #ff3333)";
                noBtn.style.color = "white";
                noBtn.style.boxShadow = "0 6px 20px rgba(255, 77, 77, 0.45)";
                
                // 2. מפעילים את כל הזיקוקים והיומן (כאילו היא לחצה על הכן המקורי)
                acceptDate();
                
                // 3. דורסים את הטקסט הרגיל בשביל לעקוץ אותה
                setTimeout(() => {
                    questionText.innerText = "הא! תפסתי אותך! לחצת כן! 😈❤️";
                }, 50);
            }
        }
        // function runAway() {
        //     // התנאי הקריטי: אנחנו בורחים *רק* אם היא כבר לחצה פעמיים
        //     if (noClickCount >= 1) {
        //         questionText.innerText = "את חושבת שיש לך חופש בחירה??";
                
        //         // שליפת הכפתור מהשורה והפיכתו לחופשי במסך
        //         noBtn.style.position = "fixed";
                
        //         // חישוב מיקום רנדומלי בתוך גבולות המסך
        //         const maxX = window.innerWidth - noBtn.offsetWidth;
        //         const maxY = window.innerHeight - noBtn.offsetHeight;
        //         const x = Math.random() * maxX;
        //         const y = Math.random() * maxY;
                
        //         // הזזת הכפתור
        //         noBtn.style.left = `${x}px`;
        //         noBtn.style.top = `${y}px`;
                
        //         // כבונוס, נגדיל את ה'כן' עוד קצת בכל פעם שהיא מנסה להתחמק
        //         yesBtn.style.transform = `scale(${2 + (noClickCount * 0.2)})`;
        //         noClickCount++; // ממשיכים לספור כדי להגדיל את הכן
        //     }
        // }
        function runAway() {
            // אם היא כבר תפסה את הכפתור והמשחק נגמר - תפסיק לברוח
            if (isAccepted) return;

            // מתחיל לברוח רק אחרי לחיצה אחת
            if (noClickCount >= 1) {
                questionText.innerText = "את חושבת שיש לך חופש בחירה?? 🏃‍♀️";
                
                // שליפת הכפתור מהשורה
                noBtn.style.position = "fixed";
                
                // חישוב מיקום (עם שוליים קטנים כדי שלא יברח אל מחוץ למסך)
                const maxX = window.innerWidth - noBtn.offsetWidth - 20;
                const maxY = window.innerHeight - noBtn.offsetHeight - 20;
                const x = Math.max(10, Math.random() * maxX);
                const y = Math.max(10, Math.random() * maxY);
                
                // הזזת הכפתור (עכשיו זה יקרה לאט ובצורה "מרחפת" בזכות ה-CSS)
                noBtn.style.left = `${x}px`;
                noBtn.style.top = `${y}px`;
            }
        }

        function acceptDate() {
            gifImage.src = "happy.gif"; // הופך את הדובי לשמח קבוע
            isAccepted = true; // נעילה למצב "כן"
            changeGif('happy', true); // עדכון מיידי של הגיף למצב שמח (עם force)
            yesBtn.style.transform = "scale(1)"; // הדגשה של הכן
            questionText.innerText = "ידעתי שתסכימי! ❤️";
            const duration = 3 * 1000;
            const animationEnd = Date.now() + duration;
            const defaults = { startVelocity: 30, spread: 360, ticks: 60, zIndex: 0 };

            function randomInRange(min, max) {
                return Math.random() * (max - min) + min;
            }

            const interval = setInterval(function() {
                const timeLeft = animationEnd - Date.now();

                if (timeLeft <= 0) {
                    return clearInterval(interval);
                }

                const particleCount = 50 * (timeLeft / duration);
                confetti(Object.assign({}, defaults, { 
                    particleCount, 
                    origin: { x: randomInRange(0.1, 0.3), y: Math.random() - 0.2 }, 
                    shapes: ['heart'], 
                    colors: ['#ff0000', '#ffb3b3'] 
                }));
                confetti(Object.assign({}, defaults, { 
                    particleCount, 
                    origin: { x: randomInRange(0.7, 0.9), y: Math.random() - 0.2 }, 
                    shapes: ['heart'], 
                    colors: ['#ff0000', '#ffb3b3'] 
                }));
            }, 250);

            setTimeout(() => {
                // הכותרת המעודכנת
                const eventTitle = encodeURIComponent("דייט חגיגי (אישור הגעה חובה)");
                const eventDetails = encodeURIComponent("הוזמנת רשמית על ידי מנהל אגף רגשות ולוגיסטיקה. נא להיערך בהתאם לערב מדהים.");
                const eventDates = "20260323/20260324"; 
                
                const calendarUrl = `https://calendar.google.com/calendar/render?action=TEMPLATE&text=${eventTitle}&dates=${eventDates}&details=${eventDetails}`;
                window.open(calendarUrl, '_blank');
            }, 2000);
        }
        function changeGif(mood, force = false) {
            // אם היא כבר הסכימה לדייט, תנעל את המצב (אלא אם אמרנו בכוח)
            if (isAccepted && !force) return;
            // התיקון הקריטי: אם אנחנו כבר במצב המבוקש, אל תטען את התמונה מחדש!
            if (mood === currentMood && !force) return;   
            
            currentMood = mood;
            const srcMap = { happy: 'happy.gif', sad: 'sad.gif', idle: 'idle.gif' };
            gifImage.src = srcMap[mood];
        }
        function getDistance(btn, x, y) {
            const rect = btn.getBoundingClientRect();
            const bx   = rect.left + rect.width  / 2;
            const by   = rect.top  + rect.height / 2;
            return Math.sqrt(Math.pow(x - bx, 2) + Math.pow(y - by, 2));
        }

        // פונקציה אחת שגם העכבר וגם האצבע מדברים איתה
        function handleProximity(x, y) {
            if (isAccepted) return;
            const threshold  = Math.min(window.innerWidth, window.innerHeight) * 0.25;
            const distToYes  = getDistance(yesBtn, x, y);
            const distToNo   = getDistance(noBtn,  x, y);
            const withinRange = Math.min(distToYes, distToNo) < threshold;

            if (!withinRange)          changeGif('idle');
            else if (distToYes < distToNo) changeGif('happy');
            else                           changeGif('sad');
        }

        // מאזין לתנועת עכבר (במחשב)
        document.addEventListener('mousemove', e => handleProximity(e.clientX, e.clientY));

        // מאזין לתנועת אצבע (בנייד)
        document.addEventListener('touchmove', e => {
            const touch = e.touches[0]; // לוקח את נקודת המגע הראשונה (אצבע אחת)
            handleProximity(touch.clientX, touch.clientY);
        }, { passive: true });
        
        // גורם ל"לא" לברוח גם בניסיון לחיצה בנייד
        noBtn.addEventListener('touchstart', () => { runAway(); }, { passive: true });
    </script>
</body>
</html>
