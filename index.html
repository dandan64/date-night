<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>הזמנה לדייט</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: #ffe6e6;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }
        h1 {
            color: #ff4d4d;
            font-size: 3rem;
            text-align: center;
            margin-bottom: 2rem;
            transition: all 0.3s ease;
        }
        .buttons-container {
            display: flex;
            gap: 20px;
            align-items: center;
            justify-content: center;
        }
        button {
            font-size: 1.5rem;
            padding: 10px 30px;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: bold;
        }
        #yesBtn {
            background-color: #ff4d4d;
            color: white;
            box-shadow: 0 4px 15px rgba(255, 77, 77, 0.4);
        }
        #yesBtn:hover {
            background-color: #ff1a1a;
        }
        #noBtn {
            background-color: #f1f1f1;
            color: #333;
        }
    </style>
</head>
<body>
    <img id="cute-gif" src="idle.gif" style="width: 200px; border-radius: 15px; margin-bottom: 20px;">
    <h1 id="questionText">האם תרצי לצאת איתי לדייט?</h1>
    <div class="buttons-container">
        <button id="yesBtn" onmouseenter="changeGif('happy')" onmouseleave="changeGif('idle')" onclick="acceptDate()">כן!</button>
        <button id="noBtn" onmouseenter="changeGif('sad')" onmouseleave="changeGif('idle')" onmouseover="runAway()" onclick="rejectDate()">לא</button>
    </div>
    <!--<button id="noBtn" onmouseover="runAway()" onclick="rejectDate()">לא</button>
     <button id="yesBtn" onclick="acceptDate()">כן!</button> --> 
          
    <script>
        let noClickCount = 0;
        const questionText = document.getElementById('questionText');
        const yesBtn = document.getElementById('yesBtn');
        const noBtn = document.getElementById('noBtn');
        const gifImage = document.getElementById('cute-gif');

        function rejectDate() {
            noClickCount++;
            
            if (noClickCount === 1) {
                questionText.innerText = "האם את בטוחה?";
                yesBtn.style.transform = "scale(1.5)";
                noBtn.style.transform = "scale(0.5)";
            } else if (noClickCount === 2) {
                questionText.innerText = "נו בבקשהה 🥺";
                yesBtn.style.transform = "scale(2)";
            }
        }
        function runAway() {
            // התנאי הקריטי: אנחנו בורחים *רק* אם היא כבר לחצה פעמיים
            if (noClickCount >= 2) {
                questionText.innerText = "את חושבת שיש לך חופש בחירה??";
                
                // שליפת הכפתור מהשורה והפיכתו לחופשי במסך
                noBtn.style.position = "fixed";
                
                // חישוב מיקום רנדומלי בתוך גבולות המסך
                const maxX = window.innerWidth - noBtn.offsetWidth;
                const maxY = window.innerHeight - noBtn.offsetHeight;
                const x = Math.random() * maxX;
                const y = Math.random() * maxY;
                
                // הזזת הכפתור
                noBtn.style.left = `${x}px`;
                noBtn.style.top = `${y}px`;
                
                // כבונוס, נגדיל את ה'כן' עוד קצת בכל פעם שהיא מנסה להתחמק
                yesBtn.style.transform = `scale(${2 + (noClickCount * 0.2)})`;
                noClickCount++; // ממשיכים לספור כדי להגדיל את הכן
            }
        }

        function acceptDate() {
            gifImage.src = "happy.gif"; // הופך את הדובי לשמח קבוע
            questionText.innerText = "ידעתי שתסכימי! ❤️";
            const duration = 3 * 1000;
            const animationEnd = Date.now() + duration;
            const defaults = { startVelocity: 30, spread: 360, ticks: 60, zIndex: 0 };

            function randomInRange(min, max) {
                return Math.random() * (max - min) + min;
            }

            const interval = setInterval(function() {
                const timeLeft = animationEnd - Date.now();

                if (timeLeft <= 0) {
                    return clearInterval(interval);
                }

                const particleCount = 50 * (timeLeft / duration);
                confetti(Object.assign({}, defaults, { 
                    particleCount, 
                    origin: { x: randomInRange(0.1, 0.3), y: Math.random() - 0.2 }, 
                    shapes: ['heart'], 
                    colors: ['#ff0000', '#ffb3b3'] 
                }));
                confetti(Object.assign({}, defaults, { 
                    particleCount, 
                    origin: { x: randomInRange(0.7, 0.9), y: Math.random() - 0.2 }, 
                    shapes: ['heart'], 
                    colors: ['#ff0000', '#ffb3b3'] 
                }));
            }, 250);

            setTimeout(() => {
                // הכותרת המעודכנת
                const eventTitle = encodeURIComponent("דייט חגיגי (אישור הגעה חובה)");
                const eventDetails = encodeURIComponent("הוזמנת רשמית על ידי מנהל אגף רגשות ולוגיסטיקה. נא להיערך בהתאם לערב מדהים.");
                const eventDates = "20260323/20260324"; 
                
                const calendarUrl = `https://calendar.google.com/calendar/render?action=TEMPLATE&text=${eventTitle}&dates=${eventDates}&details=${eventDetails}`;
                window.open(calendarUrl, '_blank');
            }, 2000);
        }
        function changeGif(mood) {
            // מוודאים שלא מחליפים גיף אם היא כבר לחצה "כן" (כדי לא להרוס את חגיגת הסיום)
            if (questionText.innerText === "ידעתי שתסכימי! ❤️") return;

            if (mood === 'happy') {
                gifImage.src = "happy.gif";
            } else if (mood === 'sad') {
                gifImage.src = "sad.gif";
            } else {
                gifImage.src = "idle.gif";
            }
        }
    </script>
</body>
</html>
